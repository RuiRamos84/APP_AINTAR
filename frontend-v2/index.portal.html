<!doctype html>
<html lang="pt-PT">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon AINTAR -->
    <link rel="icon" type="image/x-icon" href="/logos/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/logos/icon-color.png" />
    <link rel="apple-touch-icon" href="/logos/icon-color.png" />

    <!-- Viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />

    <!-- Primary Meta Tags -->
    <title>AINTAR — Portal do Cliente</title>
    <meta name="title" content="AINTAR — Portal do Cliente" />
    <meta name="description" content="Aceda aos seus pedidos, faturas e informações de conta no portal de clientes da AINTAR — Associação Intermunicipal de Água e Resíduos." />
    <meta name="author" content="AINTAR" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#1B5E8E" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#164E75" media="(prefers-color-scheme: dark)" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clientes.aintar.pt/" />
    <meta property="og:title" content="AINTAR — Portal do Cliente" />
    <meta property="og:description" content="Aceda aos seus pedidos, faturas e informações de conta no portal de clientes da AINTAR." />
    <meta property="og:image" content="/logos/logo-horizontal-color.png" />
    <meta property="og:locale" content="pt_PT" />
    <meta property="og:site_name" content="AINTAR Portal" />

    <!-- Não indexar (portal privado) -->
    <meta name="googlebot" content="noindex, nofollow" />

    <!-- PWA Manifest do Portal -->
    <link rel="manifest" href="/manifest.portal.json" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
